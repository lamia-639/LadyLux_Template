<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<header class="nav-bar">
     <div class="logo">
            <img src="img/logo.png" alt="" class="logo1"  >
        <img src="img/logo-name.png" alt="" class="logo2" >
         </div>
</header>

    <div class="register-container">
    <div class="register-box">
        <h2>Create Account</h2>
     <input type="text" id="name" placeholder="Full Name" class="input-field-register">
<input type="email" id="email" placeholder="Email Address" class="input-field-register">
<input type="password" id="password" placeholder="Create Password" class="input-field-register">
<input type="password" id="confirm" placeholder="Confirm Password" class="input-field-register">

        <button class="register-btn" onclick="registerUser();">Register</button>
    <div class="extra">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
   </div>
   </div>

                                  <!-- Java Part -->

   <script>
   
function registerUser(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;

    if(password !== confirm){
        alert("Passwords do not match!");
        return;
    }

    let user = {
        name: name,
        email: email,
        password: password
    };

    localStorage.setItem(email, JSON.stringify(user));

    alert("Registration Successful!");
    window.location.href = "login_form.html";
}

   </script>

</body>
</html>
