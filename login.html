<!DOCTYPE html>
<html>
<head>
    <title>LadyLUX - Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="nav-bar">
   <div class="logo" >
            <!-- <img src="img/logo.png" alt="" class="logo1"  > -->
        <img src="img/logo-name.png" alt="" class="logo2" >
         </div>
</header>

<div class="login-container">
    <div class="login-box">
        <h2>Login to Your Account</h2>

        <input type="email" id="loginEmail" placeholder="Enter Email" class="input-field-login">
<input type="password" id="loginPassword" placeholder="Enter Password" class="input-field-login">

<button class="login-btn" onclick="loginUser()">Login</button>

        <div class="extra">
            <p>Don't have an account? <a href="register.html">Register</a></p>
        </div>
    </div>
</div>

<script>
function loginUser(){

    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    let storedUser = localStorage.getItem(email);

    if(!storedUser){
        alert("User not found!");
        return;
    }

    let user = JSON.parse(storedUser);

    if(user.password === password){
        alert("Login Successful!");
        window.location.href = "main_shop.html";
    } else {
        alert("Incorrect Password!");
    }
}
</script>
</body>
</html>
